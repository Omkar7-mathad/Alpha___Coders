<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Medical Career Awareness</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f1f5f9;
}

header{
background:#0f766e;
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:40px 0;
}

.course-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.course-card{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
font-size:18px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.course-card i{
display:block;
font-size:28px;
margin-bottom:12px;
color:#0f766e;
}

.course-card:hover{
transform:scale(1.05);
background:#0f766e;
color:white;
}

.course-card:hover i{
color:white;
}

.btn-group{
margin-top:30px;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#0f766e;
color:white;
font-size:16px;
cursor:pointer;
}

button i{
margin-right:6px;
}

button:hover{
background:#115e59;
}

.result-box{
margin-top:30px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
display:none;
}

.result-box h3{
margin-bottom:10px;
color:#0f766e;
}

.info-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-top:30px;
text-align:center;
font-size:17px;
}

</style>
</head>

<body>

<header>
<i class="fa-solid fa-stethoscope"></i> Medical Career Awareness
</header>

<div class="container">

<!-- BACK BUTTON -->
<div style="margin-bottom:20px;">
<a href="course.html">
<button style="background:#64748b;">
<i class="fa-solid fa-arrow-left"></i> Back
</button>
</a>
</div>

<h2>Popular Medical Courses</h2>

<div class="course-grid">

<div class="course-card">
<i class="fa-solid fa-user-doctor"></i>
MBBS
</div>

<div class="course-card">
<i class="fa-solid fa-tooth"></i>
BDS
</div>

<div class="course-card">
<i class="fa-solid fa-leaf"></i>
BAMS
</div>

<div class="course-card">
<i class="fa-solid fa-heart-pulse"></i>
BHMS
</div>

<div class="course-card">
<i class="fa-solid fa-user-nurse"></i>
B.Sc Nursing
</div>

</div>

<h2 style="margin-top:50px">Choose Your Stream</h2>

<div class="btn-group">
<button onclick="setStream('pcmb')"><i class="fa-solid fa-dna"></i> PCMB</button>
</div>

<div class="info-box" id="info">
<i class="fa-solid fa-circle-info"></i>
Medical courses require Biology (PCMB). Select the stream to see entrance exams.
</div>

<h2 style="margin-top:30px; display:none;" id="examTitle">Entrance Exams</h2>

<div class="btn-group" id="examButtons" style="display:none;">
<button onclick="showCourses('neet')"><i class="fa-solid fa-book"></i> NEET</button>
<button onclick="showCourses('kcet')"><i class="fa-solid fa-school"></i> KCET</button>
</div>

<div id="result" class="result-box"></div>

</div>

<script>

let stream="";

function setStream(s){

stream=s;

document.getElementById("examButtons").style.display="block";
document.getElementById("examTitle").style.display="block";

document.getElementById("info").innerHTML =
"<i class='fa-solid fa-check'></i> You selected <b>"+s.toUpperCase()+"</b>. Now choose the entrance exam.";

}

function showCourses(exam){

let result=document.getElementById("result");
let courses="";

/* NEET */

if(exam=="neet"){

courses=`
<h3><i class="fa-solid fa-book"></i> Courses available through NEET</h3>

<div class="course-grid">

<div class="course-card"><i class="fa-solid fa-user-doctor"></i>MBBS</div>
<div class="course-card"><i class="fa-solid fa-tooth"></i>BDS</div>
<div class="course-card"><i class="fa-solid fa-leaf"></i>BAMS</div>
<div class="course-card"><i class="fa-solid fa-heart-pulse"></i>BHMS</div>
<div class="course-card"><i class="fa-solid fa-user-nurse"></i>B.Sc Nursing</div>

</div>
`;

}

/* KCET */

if(exam=="kcet"){

courses=`
<h3><i class="fa-solid fa-school"></i> Courses available through KCET</h3>

<div class="course-grid">

<div class="course-card"><i class="fa-solid fa-user-nurse"></i>B.Sc Nursing</div>
<div class="course-card"><i class="fa-solid fa-cow"></i>Veterinary Science</div>
<div class="course-card"><i class="fa-solid fa-leaf"></i>Agriculture</div>
<div class="course-card"><i class="fa-solid fa-glass-water"></i>Dairy Technology</div>
<div class="course-card"><i class="fa-solid fa-tree"></i>Forestry</div>
<div class="course-card"><i class="fa-solid fa-pills"></i>B.Pharm</div>
<div class="course-card"><i class="fa-solid fa-capsules"></i>Pharma-D</div>
<div class="course-card"><i class="fa-solid fa-leaf"></i>BNYS (Yoga & Naturopathy)</div>

</div>
`;

}

result.style.display="block";
result.innerHTML=courses;

}

</script>

</body>
</html>
