<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Logout | Career Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:linear-gradient(135deg,#4f73ff,#7f9cff);
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.logout-box{
background:white;
padding:45px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
text-align:center;
width:380px;
animation:fadeIn 0.6s ease;
}

.logout-icon{
font-size:60px;
color:#28a745;
margin-bottom:15px;
}

.logout-box h2{
font-weight:bold;
margin-bottom:10px;
}

.logout-box p{
color:#666;
font-size:15px;
margin-bottom:25px;
}

.btn-home{
background:#6c63ff;
color:white;
border:none;
}

.btn-home:hover{
background:#574fd6;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="logout-box">

<i class="fa-solid fa-circle-check logout-icon"></i>

<h2>Logged Out Successfully</h2>

<p>
Thank you for visiting our Career Portal.  
We hope our guidance helped you explore the right career path.  
Please visit again for more opportunities and insights.
</p>

<div class="d-grid gap-2">

<a href="login.html" class="btn btn-primary">Login Again</a>

<a href="index.html" class="btn btn-home">Back to Home</a>

</div>

</div>

</body>

</html>r
