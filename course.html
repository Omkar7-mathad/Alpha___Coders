<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Stream Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

.stream-card{
cursor:pointer;
transition:0.3s;
}

.stream-card:hover{
transform:scale(1.05);
}

a{
text-decoration:none;
color:black;
}

</style>

</head>

<body>

<div class="container mt-5">

<!-- Back Button -->
<button class="btn btn-secondary mb-3" onclick="window.location.href='index.html'">
<i class="fa-solid fa-arrow-left"></i> Back
</button>

<h2 class="text-center mb-4">Select Your Stream</h2>

<div class="row text-center">

<!-- Engineering -->
<div class="col-md-3">
<a href="engineering.html">
<div class="card p-3 stream-card">
<i class="fa-solid fa-gears fa-3x text-primary"></i>
<h5 class="mt-2">Engineering</h5>
</div>
</a>
</div>

<!-- Medical -->
<div class="col-md-3">
<a href="medical.html">
<div class="card p-3 stream-card">
<i class="fa-solid fa-user-doctor fa-3x text-danger"></i>
<h5 class="mt-2">Medical</h5>
</div>
</a>
</div>

<!-- Commerce -->
<div class="col-md-3">
<a href="commerce.html">
<div class="card p-3 stream-card">
<i class="fa-solid fa-chart-line fa-3x text-success"></i>
<h5 class="mt-2">Commerce</h5>
</div>
</a>
</div>

<!-- Arts -->
<div class="col-md-3">
<a href="arts.html">
<div class="card p-3 stream-card">
<i class="fa-solid fa-palette fa-3x text-warning"></i>
<h5 class="mt-2">Arts</h5>
</div>
</a>
</div>

</div>

</div>

</body>
</html>
