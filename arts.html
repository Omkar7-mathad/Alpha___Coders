<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arts Career Awareness</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f1f5f9;
}

header{
background:#dc2626;
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:40px 0;
}

.course-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.course-card{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
font-size:18px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.course-card i{
display:block;
font-size:28px;
margin-bottom:12px;
color:#dc2626;
}

.course-card:hover{
transform:scale(1.05);
background:#dc2626;
color:white;
}

.course-card:hover i{
color:white;
}

.btn-group{
margin-top:30px;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#dc2626;
color:white;
font-size:16px;
cursor:pointer;
}

button i{
margin-right:6px;
}

button:hover{
background:#b91c1c;
}

.result-box{
margin-top:30px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
display:none;
}

.result-box h3{
margin-bottom:10px;
color:#dc2626;
}

.info-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-top:30px;
text-align:center;
font-size:17px;
}

</style>
</head>

<body>

<header>
<i class="fa-solid fa-book-open"></i> Arts Career Awareness
</header>

<div class="container">

<!-- BACK BUTTON -->
<div style="margin-bottom:20px;">
<a href="course.html">
<button style="background:#64748b;">
<i class="fa-solid fa-arrow-left"></i> Back
</button>
</a>
</div>

<h2>Popular Arts Courses</h2>

<div class="course-grid">

<div class="course-card">
<i class="fa-solid fa-landmark"></i>
BA Political Science
</div>

<div class="course-card">
<i class="fa-solid fa-globe"></i>
BA Geography
</div>

<div class="course-card">
<i class="fa-solid fa-users"></i>
BA Sociology
</div>

<div class="course-card">
<i class="fa-solid fa-brain"></i>
BA Psychology
</div>

<div class="course-card">
<i class="fa-solid fa-scale-balanced"></i>
BA LLB (Law)
</div>

</div>

<h2 style="margin-top:50px">Choose Your Stream</h2>

<div class="btn-group">
<button onclick="setStream('arts')"><i class="fa-solid fa-book"></i> Arts / Humanities</button>
</div>

<div class="info-box" id="info">
<i class="fa-solid fa-circle-info"></i>
Select your stream to explore courses and career paths in Arts.
</div>

<h2 style="margin-top:30px; display:none;" id="examTitle">Career Options</h2>

<div class="btn-group" id="examButtons" style="display:none;">
<button onclick="showCourses('degree')"><i class="fa-solid fa-university"></i> Degree Courses</button>
<button onclick="showCourses('professional')"><i class="fa-solid fa-briefcase"></i> Professional Careers</button>
</div>

<div id="result" class="result-box"></div>

</div>

<script>

let stream="";

function setStream(s){

stream=s;

document.getElementById("examButtons").style.display="block";
document.getElementById("examTitle").style.display="block";

document.getElementById("info").innerHTML =
"<i class='fa-solid fa-check'></i> You selected <b>Arts</b>. Now explore available courses.";

}

function showCourses(type){

let result=document.getElementById("result");
let courses="";

/* DEGREE COURSES */

if(type=="degree"){

courses=`
<h3><i class="fa-solid fa-university"></i> Arts Degree Courses</h3>

<div class="course-grid">

<div class="course-card"><i class="fa-solid fa-landmark"></i>BA Political Science</div>
<div class="course-card"><i class="fa-solid fa-brain"></i>BA Psychology</div>
<div class="course-card"><i class="fa-solid fa-users"></i>BA Sociology</div>
<div class="course-card"><i class="fa-solid fa-globe"></i>BA Geography</div>
<div class="course-card"><i class="fa-solid fa-language"></i>BA English</div>

</div>
`;

}

/* PROFESSIONAL CAREERS */

if(type=="professional"){

courses=`
<h3><i class="fa-solid fa-briefcase"></i> Arts Professional Careers</h3>

<div class="course-grid">

<div class="course-card"><i class="fa-solid fa-scale-balanced"></i>Law (LLB)</div>
<div class="course-card"><i class="fa-solid fa-pen-nib"></i>Journalism</div>
<div class="course-card"><i class="fa-solid fa-chalkboard-user"></i>Teaching</div>
<div class="course-card"><i class="fa-solid fa-bullhorn"></i>Public Relations</div>
<div class="course-card"><i class="fa-solid fa-film"></i>Media & Communication</div>

</div>
`;

}

result.style.display="block";
result.innerHTML=courses;

}

</script>

</body>
</html>
