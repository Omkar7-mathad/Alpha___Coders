<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | CareerNavigator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* BACKGROUND */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d") center/cover no-repeat;
  position:relative;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* LOGIN CARD */
.login-container{
  position:relative;
  background:white;
  padding:40px 35px;
  width:360px;
  border-radius:12px;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  text-align:center;
  z-index:1;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}
.logo img{
  width:45px;
  margin-right:10px;
}
.logo span{
  font-size:22px;
  font-weight:600;
  color:#1c4e80;
}

/* TITLE */
.login-container h2{
  margin-bottom:25px;
  color:#333;
}

/* INPUT BOX */
.input-box{
  position:relative;
  margin-bottom:18px;
}
.input-box i{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#777;
}
.input-box input{
  width:100%;
  padding:12px 12px 12px 38px;
  border-radius:6px;
  border:1px solid #ccc;
  outline:none;
  font-size:14px;
}
.input-box input:focus{
  border-color:#4facfe;
}

/* LOGIN BUTTON */
button{
  width:100%;
  padding:12px;
  background:#4facfe;
  border:none;
  color:white;
  font-size:16px;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}
button:hover{
  background:#2f80ed;
}

/* EXTRA LINKS */
.extra-links{
  margin-top:15px;
  font-size:14px;
}
.extra-links a{
  color:#4facfe;
  text-decoration:none;
}
.extra-links a:hover{
  text-decoration:underline;
}

footer{
  margin-top:20px;
  font-size:13px;
  color:#777;
}

</style>

</head>
<body>

<div class="login-container">

  <div class="logo">
    <img src="logo.jpg">
    <span>CareerNavigator</span>
  </div>

  <h2>Login to Continue</h2>

  <form id="loginForm">

    <div class="input-box">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" placeholder="Email Address" required>
    </div>

    <div class="input-box">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="Password" required>
    </div>

    <button type="submit">
      Login <i class="fas fa-arrow-right"></i>
    </button>

  </form>

  <div class="extra-links">
    Forgot Password? <a href="reset.html">Reset</a> |
    <a href="register.html">Create Account</a>
  </div>

  <footer>
    <p>© 2026 CareerNavigator Platform</p>
  </footer>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();
  
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  
  if(!email || !password){
    alert("Please enter email and password");
    return;
  }
  
  try{
    const response = await fetch("http://localhost:5000/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        password: password
      })
    });
    
    const data = await response.json();
    
    if(data.message === "Login successful"){
      localStorage.setItem("email", email);
      alert("Login successful");
      window.location.href = "index.html";
    } else {
      alert(data.message || "Invalid credentials");
    }
  } catch(error){
    alert("Error: " + error.message);
    console.log(error);
  }
});
</script>

</body>
</html>
