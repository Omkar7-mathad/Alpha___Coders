<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Commerce Career Awareness</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f1f5f9;
}

header{
background:#7c3aed;
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:40px 0;
}

.course-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.course-card{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
font-size:18px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.course-card i{
display:block;
font-size:28px;
margin-bottom:12px;
color:#7c3aed;
}

.course-card:hover{
transform:scale(1.05);
background:#7c3aed;
color:white;
}

.course-card:hover i{
color:white;
}

.btn-group{
margin-top:30px;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#7c3aed;
color:white;
font-size:16px;
cursor:pointer;
}

button i{
margin-right:6px;
}

button:hover{
background:#6d28d9;
}

.result-box{
margin-top:30px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
display:none;
}

.result-box h3{
margin-bottom:10px;
color:#7c3aed;
}

.info-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-top:30px;
text-align:center;
font-size:17px;
}

</style>
</head>

<body>

<header>
<i class="fa-solid fa-chart-line"></i> Commerce Career Awareness
</header>

<div class="container">

<!-- BACK BUTTON -->
<div style="margin-bottom:20px;">
<a href="course.html">
<button style="background:#64748b;">
<i class="fa-solid fa-arrow-left"></i> Back
</button>
</a>
</div>

<h2>Popular Commerce Courses</h2>

<div class="course-grid">

<div class="course-card">
<i class="fa-solid fa-calculator"></i>
B.Com
</div>

<div class="course-card">
<i class="fa-solid fa-chart-pie"></i>
BBA
</div>

<div class="course-card">
<i class="fa-solid fa-building-columns"></i>
Banking & Finance
</div>

<div class="course-card">
<i class="fa-solid fa-scale-balanced"></i>
LLB (Law)
</div>

<div class="course-card">
<i class="fa-solid fa-briefcase"></i>
Business Management
</div>

</div>

<h2 style="margin-top:50px">Choose Your Stream</h2>

<div class="btn-group">
<button onclick="setStream('commerce')"><i class="fa-solid fa-chart-line"></i> Commerce</button>
</div>

<div class="info-box" id="info">
<i class="fa-solid fa-circle-info"></i>
Select your stream to explore commerce courses and career paths.
</div>

<h2 style="margin-top:30px; display:none;" id="examTitle">Career Paths / Courses</h2>

<div class="btn-group" id="examButtons" style="display:none;">
<button onclick="showCourses('ugc')"><i class="fa-solid fa-university"></i> Degree Courses</button>
<button onclick="showCourses('professional')"><i class="fa-solid fa-certificate"></i> Professional Courses</button>
</div>

<div id="result" class="result-box"></div>

</div>

<script>

let stream="";

function setStream(s){

stream=s;

document.getElementById("examButtons").style.display="block";
document.getElementById("examTitle").style.display="block";

document.getElementById("info").innerHTML =
"<i class='fa-solid fa-check'></i> You selected <b>Commerce</b>. Now explore the courses.";

}

function showCourses(type){

let result=document.getElementById("result");
let courses="";

/* DEGREE COURSES */

if(type=="ugc"){

courses=`
<h3><i class="fa-solid fa-university"></i> Commerce Degree Courses</h3>

<div class="course-grid">

<div class="course-card"><i class="fa-solid fa-calculator"></i>B.Com</div>
<div class="course-card"><i class="fa-solid fa-chart-line"></i>BBA</div>
<div class="course-card"><i class="fa-solid fa-building-columns"></i>B.Com Banking</div>
<div class="course-card"><i class="fa-solid fa-scale-balanced"></i>LLB</div>
<div class="course-card"><i class="fa-solid fa-briefcase"></i>Business Management</div>

</div>
`;

}

/* PROFESSIONAL COURSES */

if(type=="professional"){

courses=`
<h3><i class="fa-solid fa-certificate"></i> Professional Commerce Courses</h3>

<div class="course-grid">

<div class="course-card"><i class="fa-solid fa-file-invoice"></i>CA (Chartered Accountant)</div>
<div class="course-card"><i class="fa-solid fa-chart-line"></i>CFA</div>
<div class="course-card"><i class="fa-solid fa-coins"></i>Cost Accounting (CMA)</div>
<div class="course-card"><i class="fa-solid fa-scale-balanced"></i>Company Secretary (CS)</div>
<div class="course-card"><i class="fa-solid fa-chart-pie"></i>MBA</div>

</div>
`;

}

result.style.display="block";
result.innerHTML=courses;

}

</script>

</body>
</html>
